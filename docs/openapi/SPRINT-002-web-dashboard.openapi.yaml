openapi: 3.1.0
info:
  title: Attractor PHP Web Dashboard API
  version: 0.2.0
servers:
  - url: http://127.0.0.1:18082
paths:
  /:
    get:
      summary: Dashboard shell
      responses:
        '200': { description: HTML shell }
  /docs:
    get:
      summary: Embedded docs
      responses:
        '200': { description: HTML docs }
  /api/v1/pipelines:
    get:
      summary: List runs
      parameters:
        - in: query
          name: archived
          schema: { type: string, enum: [only, true, all] }
        - in: query
          name: includeArchived
          schema: { type: string, enum: [true, false] }
      responses:
        '200':
          description: Run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PipelineDetail' }
    post:
      summary: Create run
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRunRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  status: { type: string }
        '400': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}:
    get:
      summary: Get run detail
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200':
          description: Run detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PipelineDetail' }
        '404': { $ref: '#/components/responses/Error' }
    delete:
      summary: Delete run
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Deleted }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/cancel:
    post:
      summary: Cancel run
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Cancelled }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/archive:
    post:
      summary: Archive run
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Archived }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/unarchive:
    post:
      summary: Unarchive run
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Unarchived }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /api/v1/events:
    get:
      summary: Global SSE stream
      responses:
        '200':
          description: SSE stream (Snapshot then deltas)
          content:
            text/event-stream:
              schema: { type: string }
  /api/v1/pipelines/{id}/events:
    get:
      summary: Per-run SSE stream
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200':
          description: SSE stream (Snapshot then deltas)
          content:
            text/event-stream:
              schema: { type: string }
        '404': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/questions:
    get:
      summary: List pending questions
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200':
          description: Questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/PendingQuestion' }
  /api/v1/pipelines/{id}/questions/{qid}/answer:
    post:
      summary: Submit question answer
      parameters:
        - { $ref: '#/components/parameters/RunId' }
        - in: path
          name: qid
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer: { type: string }
      responses:
        '200': { description: Answer accepted }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/graph:
    get:
      summary: Render run graph SVG
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200':
          description: SVG
          content:
            image/svg+xml:
              schema: { type: string }
  /api/v1/pipelines/{id}/checkpoint:
    get:
      summary: Checkpoint
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Checkpoint }
        '404': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/context:
    get:
      summary: Context
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Context }
        '404': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/artifacts:
    get:
      summary: List artifacts
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Artifact list }
  /api/v1/pipelines/{id}/artifacts/{path}:
    get:
      summary: Fetch artifact file
      parameters:
        - { $ref: '#/components/parameters/RunId' }
        - in: path
          name: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Artifact content }
        '404': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/artifacts.zip:
    get:
      summary: Download artifact zip
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      responses:
        '200': { description: Zip file }
        '500': { $ref: '#/components/responses/Error' }
  /api/v1/pipelines/{id}/iterate:
    post:
      summary: Create a new run from modified DOT preserving lineage
      parameters: [{ $ref: '#/components/parameters/RunId' }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dotSource]
              properties:
                dotSource: { type: string }
                originalPrompt: { type: string }
      responses:
        '200':
          description: New run id
          content:
            application/json:
              schema:
                type: object
                properties:
                  newId: { type: string }
        '400': { $ref: '#/components/responses/Error' }
        '404': { $ref: '#/components/responses/Error' }
        '409': { $ref: '#/components/responses/Error' }
  /api/v1/dot/validate:
    post:
      summary: Validate DOT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dotSource]
              properties:
                dotSource: { type: string }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  diagnostics:
                    type: array
                    items:
                      type: object
                      properties:
                        severity: { type: string }
                        message: { type: string }
  /api/v1/dot/render:
    post:
      summary: Render DOT SVG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dotSource]
              properties:
                dotSource: { type: string }
      responses:
        '200': { description: Render result }
        '400': { $ref: '#/components/responses/Error' }
  /api/v1/dot/generate:
    post:
      summary: Generate DOT from prompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt: { type: string }
      responses:
        '200': { description: Generated DOT }
        '400': { $ref: '#/components/responses/Error' }
  /api/v1/dot/fix:
    post:
      summary: Fix DOT from error
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dotSource]
              properties:
                dotSource: { type: string }
                error: { type: string }
      responses:
        '200': { description: Fixed DOT }
        '400': { $ref: '#/components/responses/Error' }
  /api/v1/dot/iterate:
    post:
      summary: Iterate DOT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseDot, changes]
              properties:
                baseDot: { type: string }
                changes: { type: string }
      responses:
        '200': { description: Iterated DOT }
        '400': { $ref: '#/components/responses/Error' }
  /api/v1/dot/generate/stream:
    post:
      summary: Stream generated DOT
      responses:
        '200':
          description: SSE dot deltas
          content:
            text/event-stream:
              schema: { type: string }
  /api/v1/dot/fix/stream:
    post:
      summary: Stream fixed DOT
      responses:
        '200':
          description: SSE dot deltas
          content:
            text/event-stream:
              schema: { type: string }
  /api/v1/dot/iterate/stream:
    post:
      summary: Stream iterated DOT
      responses:
        '200':
          description: SSE dot deltas
          content:
            text/event-stream:
              schema: { type: string }
components:
  parameters:
    RunId:
      in: path
      name: id
      required: true
      schema: { type: string }
  responses:
    Error:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    ErrorEnvelope:
      type: object
      required: [error, code]
      properties:
        error: { type: string }
        code: { type: string }
    PendingQuestion:
      type: object
      required: [id, stage, type, text, options]
      properties:
        id: { type: string }
        stage: { type: string }
        type: { type: string }
        text: { type: string }
        options:
          type: array
          items:
            type: object
            properties:
              key: { type: string }
              label: { type: string }
    StageRun:
      type: object
      properties:
        index: { type: integer }
        nodeId: { type: string }
        name: { type: string }
        status: { type: string }
        startedAtMs: { type: integer, nullable: true }
        durationMs: { type: integer, nullable: true }
        error: { type: string }
        hasLog: { type: boolean }
    PipelineDetail:
      type: object
      properties:
        id: { type: string }
        displayName: { type: string }
        fileName: { type: string }
        status: { type: string }
        archived: { type: boolean }
        provider: { type: string }
        model: { type: string }
        familyId: { type: string }
        originalPrompt: { type: string }
        startedAtMs: { type: integer }
        finishedAtMs: { type: integer, nullable: true }
        currentNodeId: { type: string }
        stages:
          type: array
          items: { $ref: '#/components/schemas/StageRun' }
        logs:
          type: array
          items: { type: object }
        dotSource: { type: string }
    CreateRunRequest:
      type: object
      required: [dotSource]
      properties:
        dotSource: { type: string }
        fileName: { type: string }
        displayName: { type: string }
        provider: { type: string }
        model: { type: string }
        originalPrompt: { type: string }
